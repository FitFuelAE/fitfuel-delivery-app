<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#111111" />
<meta name="robots" content="noindex" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="FF Admin" />
<link rel="manifest" href="./admin.webmanifest" />
<link rel="apple-touch-icon" href="/icon-512.png" />
<title>FitFuel Delivery — Admin</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  :root { --green:#111111; --green-d:#000000; --bg:#f5f6f8; --card:#fff; --line:#e5e7eb; --muted:#6b7280; --red:#dc2626; --amber:#d97706; }
  html,body { margin:0; padding:0; background:var(--bg); color:#111827;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; }
  body { padding-bottom: env(safe-area-inset-bottom); }
  header { position:sticky; top:0; z-index:10; background:var(--green); color:#fff;
    padding:calc(env(safe-area-inset-top) + 14px) 16px 14px; display:flex; align-items:center; justify-content:space-between; }
  header h1 { font-size:18px; margin:0; font-weight:700; }
  header .sub { font-size:12px; opacity:.85; margin-top:2px; }
  header button { background:rgba(255,255,255,.2); color:#fff; border:none; border-radius:8px;
    padding:8px 12px; font-size:14px; font-weight:600; }
  .wrap { padding:16px; max-width:760px; margin:0 auto; }

  /* Login */
  .login { min-height:100dvh; display:flex; flex-direction:column; justify-content:center; padding:24px; max-width:420px; margin:0 auto; }
  .login h2 { text-align:center; margin:0 0 6px; }
  .login p.tag { text-align:center; color:var(--muted); margin:0 0 24px; font-size:14px; }
  label { display:block; font-size:13px; font-weight:600; color:var(--muted); margin:14px 0 6px; }
  input, select { width:100%; padding:14px; font-size:17px; border:1px solid var(--line); border-radius:12px; background:#fff; }
  input:focus, select:focus { outline:none; border-color:var(--green); }
  .btn { width:100%; padding:16px; font-size:17px; font-weight:700; border:none; border-radius:12px;
    background:var(--green); color:#fff; margin-top:20px; }
  .btn:active { background:var(--green-d); }
  .btn[disabled] { opacity:.6; }
  .btn.ghost { background:#fff; color:#374151; border:1px solid var(--line); }
  .btn.danger { background:#fff; color:var(--red); border:1px solid var(--line); }
  .btn.sm { width:auto; padding:8px 12px; font-size:13px; margin-top:0; border-radius:9px; }

  /* Tabs */
  .tabs { display:flex; flex-wrap:wrap; gap:8px; margin:0 0 16px; }
  .tabs button { flex:1 1 auto; min-width:84px; padding:10px 8px; border:1px solid var(--line); background:#fff; border-radius:10px;
    font-size:14px; font-weight:600; color:#374151; white-space:nowrap; }
  .tabs button.on { background:var(--green); color:#fff; border-color:var(--green); }

  .card { background:var(--card); border:1px solid var(--line); border-radius:16px; padding:16px; margin-bottom:14px; }
  .card h3 { margin:0 0 4px; font-size:16px; }
  .card .hint { color:var(--muted); font-size:13px; margin:0 0 6px; }
  .row2 { display:flex; gap:10px; flex-wrap:wrap; }
  .row2 > div { flex:1; min-width:120px; }

  table { width:100%; border-collapse:collapse; font-size:14px; }
  th, td { text-align:left; padding:10px 8px; border-bottom:1px solid var(--line); vertical-align:middle; }
  th { font-size:12px; text-transform:uppercase; letter-spacing:.03em; color:var(--muted); }
  td.actions { white-space:nowrap; display:flex; gap:6px; }
  .pill { display:inline-block; padding:2px 8px; border-radius:999px; font-size:12px; font-weight:600; }
  .pill.on { background:#e5e7eb; color:#111827; }
  .pill.off { background:#fee2e2; color:var(--red); }
  .pill.status { background:#f3f4f6; color:#374151; }
  .pill.master { background:#111111; color:#ffffff; }

  /* Order cards (mirror the driver app) */
  .ocard { background:var(--card); border:1px solid var(--line); border-radius:16px; padding:16px; margin-bottom:14px; }
  .ocard .otop { display:flex; justify-content:space-between; align-items:baseline; }
  .ocard .onum { font-size:18px; font-weight:800; }
  .ocard .ototal { font-size:14px; color:var(--muted); }
  .ocard .owho { font-size:15px; font-weight:600; margin-top:6px; }
  .ocard a.orow { display:flex; gap:8px; align-items:center; text-decoration:none; color:#1d4ed8; font-size:15px; margin-top:8px; word-break:break-word; }
  .ocard .oitems { margin:12px 0 0; padding:12px 0 0; border-top:1px dashed var(--line); font-size:14px; color:#374151; }
  .ocard .oitems div { display:flex; justify-content:space-between; padding:2px 0; }
  .ocard .onote { margin-top:10px; font-size:13px; color:var(--amber); background:#fffbeb; padding:8px 10px; border-radius:8px; }
  .oactions { display:flex; gap:10px; margin-top:14px; }
  .oactions .btn { margin-top:0; flex:1; }
  .oissues { margin-top:12px; display:none; }
  .oissues.open { display:block; }
  .oissues .opt { display:flex; gap:8px; }
  .oissues .opt button { flex:1; padding:12px; border-radius:10px; border:1px solid var(--line); background:#fff; font-size:14px; font-weight:600; }
  .oissues textarea { width:100%; margin-top:8px; border:1px solid var(--line); border-radius:10px; padding:10px; font-size:15px; min-height:54px; }
  /* Fulfil panel (proof photo + COD cash) */
  .ofulfil { margin-top:12px; display:none; }
  .ofulfil.open { display:block; }
  .ofulfil label.fl { display:block; font-size:13px; font-weight:600; color:var(--muted); margin:6px 0; }
  .ofulfil input[type=file] { width:100%; font-size:14px; }
  .ofulfil .preview { display:none; width:100%; max-height:220px; object-fit:cover; border-radius:12px; margin-top:10px; border:1px solid var(--line); }
  .ofulfil .cash { margin-top:12px; background:#f3f4f6; border:1px solid #e5e7eb; border-radius:12px; padding:10px 12px; }
  .ofulfil .cash label { display:flex; align-items:center; gap:8px; font-size:15px; font-weight:600; color:var(--green-d); }
  .ofulfil .cash input[type=number] { width:100%; margin-top:8px; padding:12px; font-size:16px; border:1px solid var(--line); border-radius:10px; }
  .ofulfil .confirm { margin-top:12px; }
  .geo { font-size:12px; color:var(--muted); margin-top:8px; }
  .geo.off { color:var(--amber); }
  /* Summary */
  .sumhead { display:flex; gap:10px; align-items:center; margin-bottom:14px; flex-wrap:wrap; }
  .sumhead input[type=date] { padding:10px; border:1px solid var(--line); border-radius:10px; font-size:15px; }
  .drvcard .drvtop { display:flex; justify-content:space-between; align-items:baseline; gap:10px; flex-wrap:wrap; }
  .drvcard .drvtop .nm { font-size:16px; font-weight:800; }
  .drvcard .stat { font-size:13px; color:var(--muted); }
  .drvcard .stat b { color:#111827; }
  .drvcard .cashbig { color:var(--green-d); font-weight:800; }
  .deliv { display:flex; gap:10px; align-items:center; padding:10px 0; border-top:1px solid var(--line); }
  .deliv img { width:54px; height:54px; object-fit:cover; border-radius:8px; border:1px solid var(--line); background:#f3f4f6; }
  .deliv .meta { flex:1; font-size:13px; }
  .deliv .meta .ttl { font-weight:600; }
  .fade { opacity:.4; pointer-events:none; }

  .empty, .loading { text-align:center; color:var(--muted); padding:40px 16px; }
  .toast { position:fixed; left:50%; transform:translateX(-50%); bottom:24px; background:#111827; color:#fff;
    padding:12px 18px; border-radius:999px; font-size:14px; z-index:50; opacity:0; transition:opacity .2s; max-width:90%; text-align:center; }
  .toast.show { opacity:1; }
  .err { color:var(--red); font-size:14px; text-align:center; margin-top:12px; min-height:18px; }
  .scroll { overflow-x:auto; }
</style>
</head>
<body>
<div id="root"></div>
<div id="toast" class="toast"></div>

<script>
const API = "https://febchdwrgrwlfwisnnzi.supabase.co/functions/v1/api";
const root = document.getElementById("root");
let TOKEN = localStorage.getItem("ff_admin_token") || "";
let NAME = localStorage.getItem("ff_admin_name") || "";
let ME = localStorage.getItem("ff_admin_user") || "";
let TAB = "orders";

function toast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2400);
}
function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c])); }
function fmtTime(iso){ if(!iso) return ""; const d=new Date(iso); return isNaN(d)? esc(iso) : d.toLocaleString(); }

async function api(path, opts={}) {
  const res = await fetch(API + path, {
    ...opts,
    headers: { "Content-Type":"application/json", ...(TOKEN?{Authorization:"Bearer "+TOKEN}:{}), ...(opts.headers||{}) },
  });
  let data = {};
  try { data = await res.json(); } catch {}
  if (res.status === 401 && TOKEN) { logout(); throw new Error("Session expired — please log in again"); }
  if (!res.ok) throw new Error(data.error || ("Error " + res.status));
  return data;
}

function logout(){ TOKEN=""; NAME=""; ME=""; localStorage.removeItem("ff_admin_token"); localStorage.removeItem("ff_admin_name"); localStorage.removeItem("ff_admin_user"); renderLogin(); }

// ---- Login ----
function renderLogin(){
  root.innerHTML = `
   <div class="login">
     <img src="/ff-logo.png" alt="FitFuel" style="width:120px;height:auto;display:block;margin:0 auto 12px" />
     <h2 style="margin-top:0">FitFuel Admin</h2>
     <p class="tag">Driver & delivery management</p>
     <label>Admin username</label>
     <input id="u" autocapitalize="none" autocorrect="off" inputmode="text" />
     <label>Password</label>
     <input id="p" type="password" autocomplete="current-password" />
     <button class="btn" id="go">Log in</button>
     <div class="err" id="err"></div>
   </div>`;
  const go = document.getElementById("go");
  const err = document.getElementById("err");
  async function submit(){
    err.textContent="";
    const username=document.getElementById("u").value.trim();
    const password=document.getElementById("p").value;
    if(!username||!password){ err.textContent="Enter username and password"; return; }
    go.disabled=true; go.textContent="Logging in…";
    try{
      const r = await api("/admin/login",{method:"POST",body:JSON.stringify({username,password})});
      TOKEN=r.token; NAME=r.name||username; ME=(r.username||username).toLowerCase();
      localStorage.setItem("ff_admin_token",TOKEN); localStorage.setItem("ff_admin_name",NAME); localStorage.setItem("ff_admin_user",ME);
      renderApp();
    }catch(e){ err.textContent=e.message; go.disabled=false; go.textContent="Log in"; }
  }
  go.onclick=submit;
  document.getElementById("p").addEventListener("keydown",e=>{ if(e.key==="Enter") submit(); });
}

// ---- App shell ----
function renderApp(){
  root.innerHTML = `
   <header>
     <div><h1>FitFuel Admin</h1><div class="sub">${esc(NAME)}</div></div>
     <button id="logout">Log out</button>
   </header>
   <div class="wrap">
     <div class="tabs">
       <button id="tab-orders" class="${TAB==="orders"?"on":""}">Orders</button>
       <button id="tab-allocate" class="${TAB==="allocate"?"on":""}">Allocate</button>
       <button id="tab-drivers" class="${TAB==="drivers"?"on":""}">Drivers</button>
       <button id="tab-admins" class="${TAB==="admins"?"on":""}">Admins</button>
       <button id="tab-summary" class="${TAB==="summary"?"on":""}">Summary</button>
       <button id="tab-activity" class="${TAB==="activity"?"on":""}">Activity</button>
     </div>
     <div id="panel"><div class="loading">Loading…</div></div>
   </div>`;
  document.getElementById("logout").onclick=logout;
  document.getElementById("tab-orders").onclick=()=>{ TAB="orders"; renderApp(); };
  document.getElementById("tab-allocate").onclick=()=>{ TAB="allocate"; renderApp(); };
  document.getElementById("tab-drivers").onclick=()=>{ TAB="drivers"; renderApp(); };
  document.getElementById("tab-admins").onclick=()=>{ TAB="admins"; renderApp(); };
  document.getElementById("tab-summary").onclick=()=>{ TAB="summary"; renderApp(); };
  document.getElementById("tab-activity").onclick=()=>{ TAB="activity"; renderApp(); };
  startGeo();
  if(TAB==="orders") loadOrders();
  else if(TAB==="allocate") loadAllocate();
  else if(TAB==="drivers") loadDrivers();
  else if(TAB==="admins") loadAdmins();
  else if(TAB==="summary") loadSummary();
  else loadActivity();
}

// ---- Drivers ----
async function loadDrivers(){
  const panel=document.getElementById("panel");
  panel.innerHTML = `
    <div class="card">
      <h3>Add driver</h3>
      <p class="hint">Driver logs in on the delivery app with this username + PIN.</p>
      <div class="row2">
        <div><label>Username</label><input id="nu" autocapitalize="none" autocorrect="off" /></div>
        <div><label>Full name</label><input id="nn" /></div>
        <div><label>PIN / password</label><input id="np" autocomplete="off" /></div>
      </div>
      <button class="btn" id="add">Add driver</button>
      <div class="err" id="adderr"></div>
    </div>
    <div class="card">
      <h3>Drivers</h3>
      <div class="scroll" id="dlist"><div class="loading">Loading…</div></div>
    </div>`;

  document.getElementById("add").onclick=addDriver;

  try{
    const {drivers}=await api("/admin/drivers");
    const list=document.getElementById("dlist");
    if(!drivers.length){ list.innerHTML='<div class="empty">No drivers yet — add one above.</div>'; return; }
    list.innerHTML = `<table><thead><tr>
        <th>Username</th><th>Name</th><th>Status</th><th>Added</th><th></th>
      </tr></thead><tbody>${drivers.map(driverRow).join("")}</tbody></table>`;
  }catch(e){ document.getElementById("dlist").innerHTML='<div class="empty">'+esc(e.message)+'</div>'; }
}

function driverRow(d){
  const u=esc(d.username);
  return `<tr>
    <td><strong>${u}</strong></td>
    <td>${esc(d.name)}</td>
    <td>${d.active?'<span class="pill on">active</span>':'<span class="pill off">disabled</span>'}</td>
    <td>${esc((d.created_at||"").slice(0,10))}</td>
    <td class="actions">
      <button class="btn sm ghost" onclick="resetPin('${u}')">Reset PIN</button>
      <button class="btn sm ${d.active?'danger':'ghost'}" onclick="toggleDriver('${u}',${d.active?'false':'true'})">${d.active?'Disable':'Enable'}</button>
    </td>
  </tr>`;
}

async function addDriver(){
  const err=document.getElementById("adderr"); err.textContent="";
  const username=document.getElementById("nu").value.trim();
  const name=document.getElementById("nn").value.trim();
  const pin=document.getElementById("np").value.trim();
  if(!username||!name||!pin){ err.textContent="Username, name and PIN are all required"; return; }
  const btn=document.getElementById("add"); btn.disabled=true; btn.textContent="Adding…";
  try{
    await api("/admin/drivers",{method:"POST",body:JSON.stringify({username,name,pin})});
    toast("✓ Driver added");
    loadDrivers();
  }catch(e){ err.textContent=e.message; btn.disabled=false; btn.textContent="Add driver"; }
}

async function resetPin(username){
  const pin=prompt("New PIN / password for "+username+":");
  if(pin==null) return;
  if(!pin.trim()){ toast("PIN cannot be empty"); return; }
  try{
    await api("/admin/reset",{method:"POST",body:JSON.stringify({username,pin:pin.trim()})});
    toast("✓ PIN reset for "+username);
  }catch(e){ toast(e.message); }
}

async function toggleDriver(username,active){
  const verb=active?"enable":"disable";
  if(!confirm("Are you sure you want to "+verb+" "+username+"?")) return;
  try{
    await api("/admin/toggle",{method:"POST",body:JSON.stringify({username,active})});
    toast("✓ "+username+" "+(active?"enabled":"disabled"));
    loadDrivers();
  }catch(e){ toast(e.message); }
}

// ---- Activity ----
async function loadActivity(){
  const panel=document.getElementById("panel");
  panel.innerHTML = `<div class="card">
      <h3>Delivery activity</h3>
      <p class="hint">Most recent 200 fulfilment / issue actions by drivers.</p>
      <div class="scroll" id="alist"><div class="loading">Loading…</div></div>
    </div>`;
  try{
    const {activity}=await api("/admin/activity");
    const list=document.getElementById("alist");
    if(!activity.length){ list.innerHTML='<div class="empty">No activity logged yet.</div>'; return; }
    list.innerHTML = `<table><thead><tr>
        <th>When</th><th>Driver</th><th>Order</th><th>Status</th><th>Note</th>
      </tr></thead><tbody>${activity.map(activityRow).join("")}</tbody></table>`;
  }catch(e){ document.getElementById("alist").innerHTML='<div class="empty">'+esc(e.message)+'</div>'; }
}

function activityRow(a){
  return `<tr>
    <td>${fmtTime(a.created_at)}</td>
    <td>${esc(a.driver_username||"—")}</td>
    <td>${esc(a.order_name||a.order_gid||"—")}</td>
    <td><span class="pill status">${esc((a.status||"").replace("_"," "))}</span></td>
    <td>${esc(a.note||"")}</td>
  </tr>`;
}

// ---- Admins (manage other admin users) ----
async function loadAdmins(){
  const panel=document.getElementById("panel");
  panel.innerHTML = `
    <div class="card">
      <h3>Add admin</h3>
      <p class="hint">New admins have the same rights as you. The master account can't be disabled or deleted.</p>
      <div class="row2">
        <div><label>Username</label><input id="au" autocapitalize="none" autocorrect="off" /></div>
        <div><label>Full name</label><input id="an" /></div>
        <div><label>Password</label><input id="ap" autocomplete="off" /></div>
      </div>
      <button class="btn" id="addadmin">Add admin</button>
      <div class="err" id="aerr"></div>
    </div>
    <div class="card">
      <h3>Admins</h3>
      <div class="scroll" id="alist2"><div class="loading">Loading…</div></div>
    </div>`;

  document.getElementById("addadmin").onclick=addAdmin;

  try{
    const {admins}=await api("/admin/admins");
    const list=document.getElementById("alist2");
    list.innerHTML = `<table><thead><tr>
        <th>Username</th><th>Name</th><th>Status</th><th>Added</th><th></th>
      </tr></thead><tbody>${admins.map(adminRow).join("")}</tbody></table>`;
  }catch(e){ document.getElementById("alist2").innerHTML='<div class="empty">'+esc(e.message)+'</div>'; }
}

function adminRow(a){
  const u=esc(a.username);
  const isMe = (a.username||"").toLowerCase()===ME;
  const badges = (a.is_master?'<span class="pill master">master</span> ':'') + (isMe?'<span class="pill status">you</span>':'');
  // Master row: only the master (you) can reset its password; never disable/delete.
  // Your own row: you can reset your password, but not disable/delete yourself.
  const canReset  = a.is_master ? isMe : true;
  const canToggle = !a.is_master && !isMe;
  const canDelete = !a.is_master && !isMe;
  const btns = [
    canReset  ? `<button class="btn sm ghost" onclick="resetAdmin('${u}')">Reset password</button>` : "",
    canToggle ? `<button class="btn sm ${a.active?'danger':'ghost'}" onclick="toggleAdmin('${u}',${a.active?'false':'true'})">${a.active?'Disable':'Enable'}</button>` : "",
    canDelete ? `<button class="btn sm danger" onclick="deleteAdmin('${u}')">Delete</button>` : "",
  ].join("");
  return `<tr>
    <td><strong>${u}</strong> ${badges}</td>
    <td>${esc(a.name)}</td>
    <td>${a.active?'<span class="pill on">active</span>':'<span class="pill off">disabled</span>'}</td>
    <td>${esc((a.created_at||"").slice(0,10))}</td>
    <td class="actions">${btns||'<span class="hint">—</span>'}</td>
  </tr>`;
}

async function addAdmin(){
  const err=document.getElementById("aerr"); err.textContent="";
  const username=document.getElementById("au").value.trim();
  const name=document.getElementById("an").value.trim();
  const password=document.getElementById("ap").value;
  if(!username||!name||!password){ err.textContent="Username, name and password are all required"; return; }
  const btn=document.getElementById("addadmin"); btn.disabled=true; btn.textContent="Adding…";
  try{
    await api("/admin/admins",{method:"POST",body:JSON.stringify({username,name,password})});
    toast("✓ Admin added");
    loadAdmins();
  }catch(e){ err.textContent=e.message; btn.disabled=false; btn.textContent="Add admin"; }
}

async function resetAdmin(username){
  const password=prompt("New password for admin "+username+":");
  if(password==null) return;
  if(!password.trim()){ toast("Password cannot be empty"); return; }
  try{
    await api("/admin/admin-reset",{method:"POST",body:JSON.stringify({username,password:password.trim()})});
    toast("✓ Password reset for "+username);
  }catch(e){ toast(e.message); }
}

async function toggleAdmin(username,active){
  const verb=active?"enable":"disable";
  if(!confirm("Are you sure you want to "+verb+" admin "+username+"?")) return;
  try{
    await api("/admin/admin-toggle",{method:"POST",body:JSON.stringify({username,active})});
    toast("✓ "+username+" "+(active?"enabled":"disabled"));
    loadAdmins();
  }catch(e){ toast(e.message); }
}

async function deleteAdmin(username){
  if(!confirm("Delete admin "+username+"? This cannot be undone.")) return;
  try{
    await api("/admin/admin-delete",{method:"POST",body:JSON.stringify({username})});
    toast("✓ Deleted "+username);
    loadAdmins();
  }catch(e){ toast(e.message); }
}

window.resetPin=resetPin; window.toggleDriver=toggleDriver;
window.resetAdmin=resetAdmin; window.toggleAdmin=toggleAdmin; window.deleteAdmin=deleteAdmin;

// ---- Orders (same view drivers get: see / fulfill / report issues) ----
async function loadOrders(){
  document.getElementById("panel").innerHTML='<div class="loading" id="olist">Loading orders…</div>';
  await loadOrderList();
}

let OORDERS={};
async function loadOrderList(){
  const list=document.getElementById("olist");
  try{
    const {orders}=await api("/orders");
    OORDERS=Object.fromEntries(orders.map(o=>[o.id,o]));
    if(!orders.length){ list.outerHTML='<div class="empty" id="olist">🎉 No orders waiting to be delivered.<br><br><button class="btn ghost" style="max-width:200px;margin:0 auto" onclick="loadOrderList()">Refresh</button></div>'; return; }
    list.outerHTML='<div id="olist">'+orders.map(ocard).join("")+'<button class="btn ghost" onclick="loadOrderList()">Refresh</button></div>';
  }catch(e){ list.outerHTML='<div class="empty" id="olist">'+esc(e.message)+'<br><br><button class="btn ghost" style="max-width:200px;margin:0 auto" onclick="loadOrderList()">Retry</button></div>'; }
}

function ocard(o){
  const mapsHref=o.address?"https://maps.google.com/?q="+encodeURIComponent(o.address):"";
  return `
  <div class="ocard" id="ocard-${esc(o.id)}">
    <div class="otop"><div class="onum">${esc(o.name)}</div><div class="ototal">${esc(o.total)}</div></div>
    <div class="owho">${esc(o.customerName)}</div>
    ${o.address?`<a class="orow" href="${esc(mapsHref)}" target="_blank">📍 ${esc(o.address)}</a>`:""}
    ${o.phone?`<a class="orow" href="tel:${esc(o.phone)}">📞 ${esc(o.phone)}</a>`:""}
    ${o.note?`<div class="onote">📝 ${esc(o.note)}</div>`:""}
    <div class="oitems">${o.items.map(i=>`<div><span>${esc(i.title)}</span><span>×${esc(i.quantity)}</span></div>`).join("")}</div>
    ${o.phone? `<button class="btn ghost" style="margin-top:14px" onclick="onotifyOtw('${esc(o.id)}')">📲 On my way — notify customer</button>`:""}
    <div class="oactions">
      <button class="btn" onclick="otoggleFulfill('${esc(o.id)}')">✓ Fulfilled</button>
      <button class="btn ghost" onclick="otoggleIssue('${esc(o.id)}')">Issue ▾</button>
    </div>
    <div class="ofulfil" id="offl-${esc(o.id)}">
      <label class="fl">Proof of delivery photo (required)</label>
      <input type="file" accept="image/*" capture="environment" id="ophoto-${esc(o.id)}" onchange="onOPhoto('${esc(o.id)}')" />
      <img class="preview" id="oprev-${esc(o.id)}" alt="" />
      ${o.cod ? `<div class="cash">
        <label><input type="checkbox" id="ocash-${esc(o.id)}" checked /> Cash received (COD)</label>
        <input type="number" inputmode="decimal" step="0.01" id="ocamt-${esc(o.id)}" value="${esc(o.amount)}" />
        <div style="font-size:12px;color:#000000;margin-top:6px">Enter the actual cash collected — less than the total records a partial payment.</div>
      </div>` : ""}
      <div class="geo" id="ogeo-${esc(o.id)}"></div>
      <button class="btn confirm" onclick="confirmOFulfill('${esc(o.id)}')">Confirm delivery</button>
    </div>
    <div class="oissues" id="oiss-${esc(o.id)}">
      <div class="opt">
        <button onclick="oreportIssue('${esc(o.id)}','not_home')">Not home</button>
        <button onclick="oreportIssue('${esc(o.id)}','rescheduled')">Reschedule</button>
        <button onclick="oreportIssue('${esc(o.id)}','refused')">Refused</button>
      </div>
      <textarea id="onote-${esc(o.id)}" placeholder="Optional note (e.g. left with neighbour)"></textarea>
    </div>
  </div>`;
}

function otoggleIssue(id){ document.getElementById("oiss-"+id).classList.toggle("open"); }

// ---- Geolocation + proof-photo fulfil (mirrors the driver app) ----
let CURRENT_POS=null, GEO_ON=false;
function startGeo(){
  if(GEO_ON || !("geolocation" in navigator)) return;
  GEO_ON=true;
  navigator.geolocation.watchPosition(
    p=>{ CURRENT_POS={lat:p.coords.latitude,lng:p.coords.longitude,acc:p.coords.accuracy}; },
    ()=>{},
    { enableHighAccuracy:true, maximumAge:30000, timeout:20000 }
  );
}
document.addEventListener("visibilitychange",()=>{ if(!document.hidden) startGeo(); });

const OPHOTOS={};
function downscale(file,maxDim,quality){
  return new Promise((resolve,reject)=>{
    const img=new Image();
    img.onload=()=>{
      let w=img.width,h=img.height;
      if(w>=h && w>maxDim){ h=Math.round(h*maxDim/w); w=maxDim; }
      else if(h>w && h>maxDim){ w=Math.round(w*maxDim/h); h=maxDim; }
      const c=document.createElement("canvas"); c.width=w; c.height=h;
      c.getContext("2d").drawImage(img,0,0,w,h);
      resolve(c.toDataURL("image/jpeg",quality));
    };
    img.onerror=reject;
    img.src=URL.createObjectURL(file);
  });
}
function ogeoHint(el){
  if(!el) return;
  if(CURRENT_POS){ el.className="geo"; el.textContent="📍 Location ready (±"+Math.round(CURRENT_POS.acc||0)+"m)"; }
  else { el.className="geo off"; el.textContent="📍 Location unavailable — will record without GPS"; }
}
function otoggleFulfill(id){
  const el=document.getElementById("offl-"+id);
  el.classList.toggle("open");
  if(el.classList.contains("open")){ startGeo(); ogeoHint(document.getElementById("ogeo-"+id)); }
}
async function onOPhoto(id){
  const f=(document.getElementById("ophoto-"+id).files||[])[0];
  if(!f) return;
  try{
    const dataUrl=await downscale(f,1280,0.6);
    OPHOTOS[id]=dataUrl;
    const prev=document.getElementById("oprev-"+id); prev.src=dataUrl; prev.style.display="block";
  }catch{ toast("Couldn't read that photo"); }
}
async function confirmOFulfill(id){
  if(!OPHOTOS[id]){ toast("Please add a proof photo first"); return; }
  const codCheck=document.getElementById("ocash-"+id);
  const cashCollected=codCheck?codCheck.checked:false;
  const amtEl=document.getElementById("ocamt-"+id);
  const cashAmount=cashCollected&&amtEl?Number(amtEl.value||0):null;
  const el=document.getElementById("ocard-"+id); el.classList.add("fade");
  try{
    const r = await api("/fulfill",{method:"POST",body:JSON.stringify({
      orderGid:id, photo:OPHOTOS[id], cashCollected, cashAmount,
      customerPhone:(OORDERS[id]||{}).phone||"",
      lat:CURRENT_POS?CURRENT_POS.lat:null, lng:CURRENT_POS?CURRENT_POS.lng:null, accuracy:CURRENT_POS?CURRENT_POS.acc:null
    })});
    toast(r&&r.paymentWarning ? ("✓ Fulfilled — payment not marked: "+r.paymentWarning) : "✓ Fulfilled");
    delete OPHOTOS[id];
    el.style.transition="opacity .3s"; el.style.opacity="0"; setTimeout(()=>el.remove(),300);
  }catch(e){ el.classList.remove("fade"); toast(e.message); }
}

async function oreportIssue(id,status){
  const note=(document.getElementById("onote-"+id)||{}).value||"";
  const o=OORDERS[id]||{};
  const el=document.getElementById("ocard-"+id); el.classList.add("fade");
  try{
    await api("/report-issue",{method:"POST",body:JSON.stringify({orderGid:id,status,note,customerPhone:o.phone||"",orderName:o.name||""})});
    toast("Saved: "+status.replace("_"," "));
    el.style.transition="opacity .3s"; el.style.opacity="0"; setTimeout(()=>el.remove(),300);
  }catch(e){ el.classList.remove("fade"); toast(e.message); }
}

async function onotifyOtw(id){
  const o=OORDERS[id]; if(!o) return;
  if(!o.phone){ toast("No phone number on this order"); return; }
  try{
    const r=await api("/notify",{method:"POST",body:JSON.stringify({kind:"otw",orderGid:id})});
    if(r&&r.skipped){ toast("WhatsApp isn't set up yet"); return; }
    toast("📲 Customer notified");
  }catch(e){ toast(e.message); }
}

window.loadOrderList=loadOrderList; window.otoggleIssue=otoggleIssue; window.oreportIssue=oreportIssue;
window.otoggleFulfill=otoggleFulfill; window.onOPhoto=onOPhoto; window.confirmOFulfill=confirmOFulfill; window.onotifyOtw=onotifyOtw;

// ---- Summary (end-of-day, per driver) ----
function todayDubai(){ return new Date(Date.now()+4*3600*1000).toISOString().slice(0,10); }
let SUMMARY_DATE = todayDubai();

async function loadSummary(){
  const panel=document.getElementById("panel");
  panel.innerHTML=`
    <div class="sumhead">
      <span class="hint">Day (Asia/Dubai):</span>
      <input type="date" id="sumdate" value="${esc(SUMMARY_DATE)}" max="${esc(todayDubai())}" />
    </div>
    <div id="sumbody"><div class="loading">Loading…</div></div>`;
  document.getElementById("sumdate").onchange=(e)=>{ SUMMARY_DATE=e.target.value||todayDubai(); loadSummary(); };
  try{
    const {summary}=await api("/admin/summary?date="+encodeURIComponent(SUMMARY_DATE));
    const body=document.getElementById("sumbody");
    if(!summary.length){ body.innerHTML='<div class="empty">No deliveries on this date.</div>'; return; }
    body.innerHTML=summary.map(drvCard).join("");
  }catch(e){ document.getElementById("sumbody").innerHTML='<div class="empty">'+esc(e.message)+'</div>'; }
}

function fmtMoney(n){ return (Math.round(Number(n||0)*100)/100).toFixed(2); }

function drvCard(d){
  return `<div class="card drvcard">
    <div class="drvtop">
      <div class="nm">${esc(d.driver)}</div>
      <div class="stat"><b>${esc(d.completed)}</b> delivered · cash collected <span class="cashbig">${esc(fmtMoney(d.cashTotal))}</span></div>
    </div>
    <div>${d.items.map(delivRow).join("")}</div>
  </div>`;
}

function delivRow(it){
  const geo=(it.lat!=null&&it.lng!=null)
    ? `<a href="https://maps.google.com/?q=${esc(it.lat)},${esc(it.lng)}" target="_blank">📍 GPS</a>`
    : '<span class="hint">no GPS</span>';
  const cash=it.cash_collected?` · 💵 ${esc(fmtMoney(it.cash_amount))}`:"";
  const img=it.photoUrl
    ? `<a href="${esc(it.photoUrl)}" target="_blank"><img src="${esc(it.photoUrl)}" alt="proof" /></a>`
    : `<img alt="no photo" />`;
  return `<div class="deliv">
    ${img}
    <div class="meta">
      <div class="ttl">${esc(it.order_name||"—")} <span class="pill status">${esc((it.status||"").replace("_"," "))}</span></div>
      <div class="hint">${esc(fmtTime(it.created_at))} · ${geo}${cash}</div>
      ${it.note?`<div class="hint">📝 ${esc(it.note)}</div>`:""}
    </div>
  </div>`;
}

// ---- Allocate (assign orders to drivers) ----
async function loadAllocate(){
  const panel=document.getElementById("panel");
  panel.innerHTML='<div class="loading" id="alloc">Loading orders…</div>';
  try{
    const [dRes,oRes]=await Promise.all([api("/admin/drivers"), api("/orders")]);
    const active=(dRes.drivers||[]).filter(d=>d.active);
    const orders=oRes.orders||[];
    const el=document.getElementById("alloc");
    if(!active.length){ el.outerHTML='<div class="empty" id="alloc">Add an active driver first (Drivers tab).</div>'; return; }
    if(!orders.length){ el.outerHTML='<div class="empty" id="alloc">No open orders to allocate.</div>'; return; }
    const opts=(sel)=>'<option value="">— Unassigned —</option>'+active.map(d=>`<option value="${esc(d.username)}" ${sel===d.username?'selected':''}>${esc(d.name)} (${esc(d.username)})</option>`).join("");
    el.outerHTML='<div id="alloc">'+orders.map(o=>`
      <div class="card">
        <div class="drvtop">
          <div><div class="nm">${esc(o.name)}</div><div class="hint">${esc(o.customerName||"")}</div></div>
          <span class="pill ${o.assignedTo?'on':'off'}" id="apill-${esc(o.id)}">${o.assignedTo?esc(o.assignedTo):'unassigned'}</span>
        </div>
        <label class="hint" style="display:block;margin-top:8px">Allocate to driver</label>
        <select onchange="assignOrder('${esc(o.id)}', this.value)">${opts(o.assignedTo)}</select>
      </div>`).join("")+'</div>';
  }catch(e){ const el=document.getElementById("alloc"); if(el) el.outerHTML='<div class="empty" id="alloc">'+esc(e.message)+'</div>'; }
}

async function assignOrder(orderGid, driverUsername){
  try{
    const r=await api("/admin/assign",{method:"POST",body:JSON.stringify({orderGid,driverUsername})});
    const pill=document.getElementById("apill-"+orderGid);
    if(pill){ pill.className="pill "+(r.assignedTo?"on":"off"); pill.textContent=r.assignedTo||"unassigned"; }
    toast(r.assignedTo?("✓ Allocated to "+r.assignedTo):"✓ Unassigned");
  }catch(e){ toast(e.message); }
}
window.assignOrder=assignOrder;

// ---- boot ----
if("serviceWorker" in navigator){ navigator.serviceWorker.register("./sw.js").catch(()=>{}); }
if(TOKEN) renderApp(); else renderLogin();
